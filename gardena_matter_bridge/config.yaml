#
# Installiert die GARDENA Matter Bridge auf dem Gateway OHNE Roh-SSH/Bauen:
# Nutzer traegt Geraete-ID + Aufkleber-Passwort ein -> Add-on aktiviert SSH ueber
#
# Schema-Referenz: https://developers.home-assistant.io/docs/add-ons/configuration/
name: GARDENA Matter & MQTT Bridge
version: "0.1.8"
slug: gardena_matter_bridge
description: >-
  Installiert die GARDENA Matter & MQTT Bridge auf dem GARDENA smart Gateway (19005) -
  ohne SSH, ohne Bauen. Geraete-ID + Aufkleber-Passwort eingeben, fertig.
url: https://github.com/wuselAUT/gardena-matter-mqtt-bridge

# Architekturen, fuer die das Add-on-Image gebaut wird. Das Add-on selbst laeuft
# in HA (nicht am Gateway) und braucht nur curl/ssh/scp -> alle gaengigen Archs.
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

# Ingress: eigene Status-/Onboarding-Web-UI im HA-Seitenpanel ().
ingress: true
ingress_port: 8099
panel_icon: mdi:sprout
panel_title: GARDENA Matter & MQTT

# Boot-Verhalten: manuell starten (Nutzer fuellt erst die Optionen aus).
boot: manual
startup: application
init: false

# Das Add-on braucht Netzwerkzugriff (HTTPS zum Gateway + GitHub-Release).
# host_network NICHT noetig: ausgehende Verbindungen genuegen.

# ── Optionen (Default-Werte) ────────────────────────────────────────────────
# device_id ist das EINZIGE Credential-Feld: seine ersten 8 Zeichen sind das
# Login-Passwort (Aufkleber-PW). Daher Schema-Typ `password` (maskiert) und als
options:
  gateway_host: ""
  device_id: ""
  enable_web_ui: true
  disable_ssh_after_deploy: false
  github_repo: "wuselAUT/gardena-matter-mqtt-bridge"
  # Leer ("") = nutzt automatisch die gepinnte Version aus bridge-release.lock.
  # Empty ("") = uses the pinned version from bridge-release.lock automatically.
  # Explizit gesetzt: muss exakt mit dem Lock-Tag uebereinstimmen (fail-closed).
  # Bei leerem Default muss dieser Wert nach einem Add-on-Update NICHT mehr manuell
  # angepasst werden.
  release_tag: ""
  # Repo). Gesetzt = Authorization: Bearer <token> (privates Repo). Secret -> nie
  # loggen, nie committen (Default leer, R12).
  github_token: ""
  # enable_mqtt: MQTT-Publisher-Dienst aktivieren (additiv, Matter laeuft weiter).
  # mqtt_broker_host: FQDN/IP des MQTT-Brokers (kein Broker auf dem Gateway — nur
  # mqtt_broker_user / mqtt_broker_password: Credentials fuer den Broker.
  #   Passwort als `password`-Typ gespeichert (maskiert, nie geloggt).
  # mqtt_topic_prefix: Topic-Praefix (Standard "gardena"). Geraete-Topics:
  #   <prefix>/<fnv16-hash>/<resource>/state
  enable_mqtt: false
  mqtt_broker_host: ""
  mqtt_broker_user: ""
  mqtt_broker_password: ""
  mqtt_topic_prefix: "gardena"

# ── Options-Schema (Typen/Validierung; HA-Add-on-Schema) ────────────────────
schema:
  gateway_host: str
  device_id: password
  enable_web_ui: bool
  disable_ssh_after_deploy: bool
  github_repo: str
  release_tag: str
  github_token: "password?"
  enable_mqtt: bool
  mqtt_broker_host: str
  mqtt_broker_user: str
  mqtt_broker_password: "password?"
  mqtt_topic_prefix: str
